# .github/workflows/catholic-scraper.yml
name: Catholic Saints Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: node catholic-scraper.js

      - uses: actions/upload-artifact@v4
        with:
          name: saints-list
          path: saints.csv
          retention-days: 30

      - name: Commit saints.csv to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add saints.csv
          git diff --staged --quiet || git commit -m "Update saints list"
          git push
